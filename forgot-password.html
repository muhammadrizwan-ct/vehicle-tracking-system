<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Connectia ERP</title>
    <link rel="stylesheet" href="css/styles.css?v=20260325-02">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon" style="font-size: 48px; color: #1976d2;">
                    <i class="fas fa-map-location-dot"></i>
                </div>
                <h1 style="color: #0a5299;">Connectia ERP</h1>
                <p style="margin-top: 8px; color: var(--gray-600);">Reset your password</p>
            </div>

            <div class="login-form">
                <div class="form-group">
                    <label for="reset-email">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="reset-email" placeholder="Enter your account email" autocomplete="off" maxlength="254">
                </div>

                <div class="form-group">
                    <label for="reset-otp">
                        <i class="fas fa-shield-alt"></i>
                        OTP
                    </label>
                    <input type="text" id="reset-otp" placeholder="Enter OTP from email" autocomplete="off" maxlength="10" inputmode="numeric">
                </div>

                <div class="form-group">
                    <label for="reset-new-password">
                        <i class="fas fa-key"></i>
                        New Password
                    </label>
                    <input type="password" id="reset-new-password" placeholder="Enter new password" maxlength="128">
                </div>

                <div class="form-group">
                    <label for="reset-confirm-password">
                        <i class="fas fa-key"></i>
                        Confirm New Password
                    </label>
                    <input type="password" id="reset-confirm-password" placeholder="Confirm new password" maxlength="128">
                </div>

                <div class="forgot-password-actions">
                    <button type="button" id="send-otp-btn" class="btn btn-block">
                        <i class="fas fa-paper-plane"></i>
                        Send OTP
                    </button>
                    <button type="button" id="verify-reset-btn" class="btn btn-success btn-block">
                        <i class="fas fa-unlock-alt"></i>
                        Verify OTP & Update Password
                    </button>
                </div>

                <div id="reset-password-message" class="error-message hidden"></div>

                <a href="index.html" class="login-link-btn" style="display:block; text-align:center; margin-top: 12px;">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="js/config.js?v=20260303-30"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        window.supabase = window.supabase || supabase;
        window.supabaseClient = window.supabase.createClient(
            CONFIG.SUPABASE_URL,
            CONFIG.SUPABASE_ANON_KEY
        );
    </script>
    <script src="js/api.js?v=20260303-30"></script>
    <script src="js/auth.js?v=20260325-01"></script>
    <script>
        // Persistent rate limit using localStorage
        const OTP_RATE_LIMIT_KEY = 'forgot_password_otp_cooldown';
        const OTP_COOLDOWN_SECONDS = 180; // 3 minutes to respect Supabase rate limits

        function isRateLimited() {
            const cooldownEndTime = localStorage.getItem(OTP_RATE_LIMIT_KEY);
            if (!cooldownEndTime) return false;
            
            const now = Date.now();
            const endTime = Number(cooldownEndTime);
            return endTime > now;
        }

        function getSecondsLeft() {
            const cooldownEndTime = localStorage.getItem(OTP_RATE_LIMIT_KEY);
            if (!cooldownEndTime) return 0;
            
            const now = Date.now();
            const endTime = Number(cooldownEndTime);
            return Math.max(0, Math.ceil((endTime - now) / 1000));
        }

        function setRateLimitCooldown() {
            const cooldownEndTime = Date.now() + (OTP_COOLDOWN_SECONDS * 1000);
            localStorage.setItem(OTP_RATE_LIMIT_KEY, String(cooldownEndTime));
        }

        function clearRateLimitCooldown() {
            localStorage.removeItem(OTP_RATE_LIMIT_KEY);
        }

        // Real-time input filtering
        const otpInput = document.getElementById('reset-otp');
        if (otpInput) {
            otpInput.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
            });
        }

        const emailInput = document.getElementById('reset-email');
        if (emailInput) {
            emailInput.addEventListener('input', (e) => {
                e.target.value = e.target.value.trim().toLowerCase();
            });
        }

        function setResetPasswordMessage(message, type) {
            const messageEl = document.getElementById('reset-password-message');
            if (!messageEl) return;

            if (!message) {
                messageEl.textContent = '';
                messageEl.classList.add('hidden');
                messageEl.classList.remove('success-message');
                return;
            }

            messageEl.textContent = String(message);
            messageEl.classList.remove('hidden');
            messageEl.classList.toggle('success-message', type === 'success');
        }

        function startOtpCooldownTimer() {
            const sendOtpBtn = document.getElementById('send-otp-btn');
            const updateTimer = () => {
                const secondsLeft = getSecondsLeft();
                
                if (secondsLeft > 0) {
                    sendOtpBtn.disabled = true;
                    sendOtpBtn.textContent = `⏱️ Resend in ${secondsLeft}s`;
                    setTimeout(updateTimer, 100);
                } else {
                    sendOtpBtn.disabled = false;
                    sendOtpBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send OTP';
                    clearRateLimitCooldown();
                }
            };
            
            updateTimer();
        }

        function isRateLimitError(message) {
            const msg = String(message || '').toLowerCase();
            return msg.includes('rate limit') || msg.includes('too many') || msg.includes('wait') || msg.includes('email');
        }

        async function onSendOtp() {
            const email = String(document.getElementById('reset-email')?.value || '').trim();
            const sendOtpBtn = document.getElementById('send-otp-btn');

            if (!email) {
                setResetPasswordMessage('Please enter your email address.', 'error');
                return;
            }

            if (isRateLimited()) {
                const secondsLeft = getSecondsLeft();
                setResetPasswordMessage(`Please wait ${secondsLeft}s before requesting another OTP.`, 'error');
                return;
            }

            sendOtpBtn.disabled = true;
            const result = await Auth.sendPasswordResetOtp(email);
            setResetPasswordMessage(result.message, result.success ? 'success' : 'error');
            
            if (result.success) {
                setRateLimitCooldown();
                startOtpCooldownTimer();
            } else {
                sendOtpBtn.disabled = false;
                // If Supabase returned a rate limit error, enforce cooldown anyway
                if (isRateLimitError(result.message)) {
                    setRateLimitCooldown();
                    startOtpCooldownTimer();
                }
            }
        }

        // Initialize cooldown on page load if still in effect
        window.addEventListener('load', () => {
            if (isRateLimited()) {
                startOtpCooldownTimer();
            }
        });

        async function onVerifyAndReset() {
            const email = String(document.getElementById('reset-email')?.value || '').trim();
            const otp = String(document.getElementById('reset-otp')?.value || '').trim();
            const newPassword = String(document.getElementById('reset-new-password')?.value || '');
            const confirmPassword = String(document.getElementById('reset-confirm-password')?.value || '');

            if (!email || !otp || !newPassword || !confirmPassword) {
                setResetPasswordMessage('Please fill all reset fields.', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                setResetPasswordMessage('New password and confirm password do not match.', 'error');
                return;
            }

            const result = await Auth.completePasswordReset(email, otp, newPassword);
            setResetPasswordMessage(result.message, result.success ? 'success' : 'error');

            if (result.success) {
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1200);
            }
        }

        document.getElementById('send-otp-btn')?.addEventListener('click', onSendOtp);
        document.getElementById('verify-reset-btn')?.addEventListener('click', onVerifyAndReset);
    </script>
</body>
</html>
